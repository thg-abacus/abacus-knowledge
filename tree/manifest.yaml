        index: tree/integrations/po/index.md
        docs:
          - path: tree/integrations/po/setup.md
            title: "PO Setup"
            intent: [setup, configurar]
          - path: tree/integrations/po/mapping.md
            title: "PO Field Mapping"
            intent: [mapping, field, campo]
      trn:
        title: "TRN — Transaction"
        description: "Transaction integration"
        intent: [trn, transaction, transacción]
